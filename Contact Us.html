<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا</title>
     <!-- style css -->
    <link rel="stylesheet" href="style.css" />
    <style>
        body { font-family: 'Mirza', sans-serif; line-height: 1.6; background-color: #f4f4f4; margin: 20px; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        p { text-align: center; color: #555; }
        .email-box { text-align: center; background: #eee; padding: 15px; border-radius: 5px; margin-top: 20px; font-weight: bold; }
    </style>
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
    <div class="translate-wrapper">
        <button class="main-translate-btn" id="translateBtn" onclick="toggleTranslateMenu()">
            🌐 اختر اللغة / Language
        </button>
        
        <div class="languages-dropdown" id="languagesDropdown">
            <button onclick="changeLanguage('ar')">🇪🇬 العربية</button>
            <button onclick="changeLanguage('en')">🇬🇧 English</button>
            <button onclick="changeLanguage('es')">🇪🇸 Español</button>
            <button onclick="changeLanguage('ru')">🇷🇺 Русский</button>
            <button onclick="changeLanguage('fr')">🇫🇷 Français</button>
        </div>
    </div>

    <div id="google_translate_element" style="display:none;"></div>


    <script src="script.js"></script>
    
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <div class="container">
        <h1>اتصل بنا</h1>
        <p>يسعدنا تواصلك معنا! إذا كان لديك أي استفسار أو اقتراح، لا تتردد في مراسلتنا عبر البريد الإلكتروني التالي:</p>
        
        <div class="email-box">
            beshoy.amged.free.online.games@gmail.com
        </div>

        <p style="margin-top: 20px;">نحن نحاول الرد على جميع الرسائل في غضون 24-48 ساعة.</p>
    </div>
</body>
</html>
